name: Obtener Números Spam

on:
  schedule:
    - cron: '0 16 * * *'  # 16:00 UTC = 18:00 UTC+2 (Spain time)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Run Spanish phone scraper (new implementation)
      env:
        PROXY: ${{ secrets.PROXY }}
      run: |
        python -m src.spider
    
    - name: Run legacy scraper for comparison
      env:
        PROXY: ${{ secrets.PROXY }}
      run: |
        python src/scraper.py

    - name: Upload numbers as artifact
      uses: actions/upload-artifact@v4
      with:
        name: phone-numbers
        path: |
          lista_numeros_spam.txt
          numeros_spam_dialer.txt
          contactos_spam.vcf
          numeros_spam.json
        
    - name: Commit and push results
      run: |
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add lista_numeros_spam.txt numeros_spam_dialer.txt contactos_spam.vcf numeros_spam.json
        git diff-index --quiet HEAD || (git commit -m "Update phone numbers [skip ci]" && git push)
